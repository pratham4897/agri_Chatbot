<!DOCTYPE html>
<html>
<head>

<title>Agri Doctor Chatbot</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#2ecc71,#27ae60);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.chat-container{
width:420px;
background:white;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
overflow:hidden;
}

h1{
text-align:center;
background:#27ae60;
color:white;
margin:0;
padding:15px;
font-size:22px;
}

#chatbox{
height:420px;
overflow-y:auto;
padding:15px;
background:#f7f7f7;
}

.message{
margin:10px 0;
padding:10px 14px;
border-radius:12px;
max-width:75%;
animation:fadeIn 0.3s ease;
}

.user{
background:#2ecc71;
color:white;
margin-left:auto;
}

.bot{
background:#ecf0f1;
color:black;
}

.input-area{
display:flex;
border-top:1px solid #ddd;
}

#userInput{
flex:1;
padding:12px;
border:none;
outline:none;
font-size:14px;
}

button{
background:#27ae60;
border:none;
color:white;
padding:12px 18px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#219150;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

</style>

</head>

<body>

<div class="chat-container">

<h1>🌾 Agri Doctor AI</h1>

<div id="chatbox"></div>

<div class="input-area">
<input id="userInput" placeholder="Ask about crop diseases..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

async function sendMessage(){

let input=document.getElementById("userInput")
let message=input.value.trim()

if(message==="") return

addMessage(message,"user")

input.value=""

let response=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:message})
})

let data=await response.json()

addMessage(data.reply,"bot")

}

function addMessage(text,type){

let chatbox=document.getElementById("chatbox")

let msg=document.createElement("div")

msg.classList.add("message",type)

msg.innerText=text

chatbox.appendChild(msg)

chatbox.scrollTop=chatbox.scrollHeight

}

document.getElementById("userInput").addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendMessage()
}
})

</script>

</body>

</html>
